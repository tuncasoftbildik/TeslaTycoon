<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#2a2d34"/>
      <stop offset="60%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff3a4a"/>
      <stop offset="50%" stop-color="#E31937"/>
      <stop offset="100%" stop-color="#990011"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="180" fill="url(#bg)"/>
  <rect x="20" y="20" width="984" height="984" rx="164" fill="none" stroke="#E31937" stroke-width="6" opacity="0.35"/>

  <g filter="url(#glow)">
    <path d="M560 130 L340 560 L480 560 L420 840 L680 410 L540 410 L620 130 Z"
          fill="url(#bolt)" stroke="#ffffff" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <text x="512" y="930" font-family="Helvetica, Arial, sans-serif" font-size="86" font-weight="900"
        text-anchor="middle" fill="#ffffff" letter-spacing="8">TESLA TYCOON</text>
</svg>
